# BSVibe — PRODUCTION compose OVERRIDE.
#
# Layered on top of deploy/compose.yaml; it overrides the dev hardcodes with
# env-driven values, drops the public PG/Redis port publishing, and adds a
# persistent volume for the filesystem roots (vault / skills / runs).
#
# Usage (from the repo root):
#   docker compose -f deploy/compose.yaml -f deploy/compose.prod.yaml \
#     --env-file deploy/.env.prod up -d
#
# The base compose.yaml stays the source of build context, service names,
# healthchecks, and depends_on; this file ONLY changes prod-relevant settings.
# See deploy/README.md for the full runbook.

services:
  postgres:
    environment:
      POSTGRES_USER: bsvibe
      POSTGRES_PASSWORD: ${BSVIBE_DB_PASSWORD:?set BSVIBE_DB_PASSWORD in .env.prod}
      POSTGRES_DB: bsvibe
    # Do NOT publish 5432 to the host in prod — only the internal compose
    # network reaches it. (`!reset []` clears the dev port mapping.)
    ports: !reset []

  redis:
    # Same: keep Redis internal-only.
    ports: !reset []

  backend:
    environment:
      # B2b two-role Postgres. BSVIBE_DATABASE_URL is the RUNTIME role
      # (least-privilege bsvibe_app, NOSUPERUSER NOBYPASSRLS) so Postgres RLS is
      # a REAL layer-3 tenant-isolation backstop for the app's own connections.
      BSVIBE_DATABASE_URL: ${BSVIBE_DATABASE_URL:?set BSVIBE_DATABASE_URL (runtime bsvibe_app role)}
      # The OWNER role DSN alembic runs as (this service migrates on boot). It
      # needs DDL + CREATE ROLE to provision bsvibe_app + its grants. Falls back
      # to BSVIBE_DATABASE_URL inside the app only if unset — but in prod it MUST
      # be the owner or the runtime_role migration cannot create the role.
      BSVIBE_MIGRATION_DATABASE_URL: ${BSVIBE_MIGRATION_DATABASE_URL:?set BSVIBE_MIGRATION_DATABASE_URL (owner bsvibe role)}
      # The password the runtime_role migration assigns to bsvibe_app. Must match
      # the userinfo in BSVIBE_DATABASE_URL. Only the migrating (backend) service
      # needs it.
      BSVIBE_APP_DB_PASSWORD: ${BSVIBE_APP_DB_PASSWORD:?set BSVIBE_APP_DB_PASSWORD (bsvibe_app role password)}
      BSVIBE_REDIS_URL: ${BSVIBE_REDIS_URL:-redis://redis:6379/0}
      BSVIBE_ENVIRONMENT: ${BSVIBE_ENVIRONMENT:-prod}
      BSVIBE_WORKER_MODE: ${BSVIBE_WORKER_MODE:-db_polling}
      BSVIBE_GIT_SHA: ${GIT_SHA:-prod}
      BSVIBE_GATEWAY_KMS_KEY_B64: ${BSVIBE_GATEWAY_KMS_KEY_B64:?set BSVIBE_GATEWAY_KMS_KEY_B64}
      BSVIBE_SUPABASE_URL: ${BSVIBE_SUPABASE_URL:?set BSVIBE_SUPABASE_URL}
      BSVIBE_SUPABASE_PUBLISHABLE_KEY: ${BSVIBE_SUPABASE_PUBLISHABLE_KEY:?set BSVIBE_SUPABASE_PUBLISHABLE_KEY}
      # Browser PWA (app.bsvibe.dev) calls the backend cross-origin; this list is
      # what CORSMiddleware allows. The prod default carries the production
      # origin so a fresh prod deploy without the env var in .env.prod still
      # serves cross-origin instead of falling back to the localhost-only code
      # default and 405'ing the PWA's /api/v1/accounts preflight (the bug
      # /impeccable audit surfaced on Settings/Models in 2026-05).
      BSVIBE_CORS_ALLOWED_ORIGINS: ${BSVIBE_CORS_ALLOWED_ORIGINS:-https://app.bsvibe.dev}
      # Session-JWT verification (backend/shared/authz — these are UNPREFIXED,
      # not BSVIBE_). The backend logs in against Supabase GoTrue, then must
      # VERIFY the returned ES256 session JWT via the project's JWKS. Without
      # these the verifier defaults to HS256 + a missing user_jwt_secret and
      # every authenticated /api/v1/* call 401s ("user_jwt_secret not configured").
      USER_JWT_JWKS_URL: ${USER_JWT_JWKS_URL:?set USER_JWT_JWKS_URL}
      USER_JWT_ALGORITHM: ${USER_JWT_ALGORITHM:-ES256}
      USER_JWT_AUDIENCE: ${USER_JWT_AUDIENCE:-authenticated}
      USER_JWT_ISSUER: ${USER_JWT_ISSUER:?set USER_JWT_ISSUER}
      BSVIBE_DEFAULT_WORKSPACE_REGION: ${BSVIBE_DEFAULT_WORKSPACE_REGION:-us-1}
      BSVIBE_KNOWLEDGE_VAULT_ROOT: ${BSVIBE_KNOWLEDGE_VAULT_ROOT:-/app/var/vault}
      BSVIBE_KNOWLEDGE_DEFAULT_REGION: ${BSVIBE_KNOWLEDGE_DEFAULT_REGION:-us-1}
      # Knowledge semantic-search embedding (G6): the pgvector index DERIVED from
      # the Markdown SoT. Deployment-level model — set it and every settled note
      # is auto-embedded + queries embed against it; empty disables semantic
      # search (canon/decision/rejection retrieval unaffected). e.g.
      # ``ollama/bge-m3`` + api_base ``http://host.docker.internal:11434``.
      BSVIBE_KNOWLEDGE_EMBEDDING_MODEL: ${BSVIBE_KNOWLEDGE_EMBEDDING_MODEL:-}
      BSVIBE_KNOWLEDGE_EMBEDDING_API_BASE: ${BSVIBE_KNOWLEDGE_EMBEDDING_API_BASE:-}
      BSVIBE_SKILLS_ROOT: ${BSVIBE_SKILLS_ROOT:-/app/var/skills}
      BSVIBE_RUN_WORKSPACE_ROOT: ${BSVIBE_RUN_WORKSPACE_ROOT:-/app/var/runs}
      BSVIBE_AUDIT_RELAY_URL: ${BSVIBE_AUDIT_RELAY_URL:-}
      BSVIBE_OAUTH_ISSUER: ${BSVIBE_OAUTH_ISSUER:-https://api.bsvibe.dev}
      # T2b-1 — the OAuth signing key. It MUST be the same value in every container: the
      # worker MINTS the run-scoped task token and the backend VERIFIES it. Without a shared
      # PEM each process generates its own key at boot, so (a) every restart silently
      # invalidates every outstanding token — each deploy quietly broke the founder's MCP
      # connection — and (b) the worker's token can never verify at the backend (measured:
      # 401 invalid_token). The processes refuse to boot without it outside dev.
      #   openssl ecparam -genkey -name prime256v1 -noout | openssl pkcs8 -topk8 -nocrypt
      BSVIBE_OAUTH_PRIVATE_KEY_PEM: ${BSVIBE_OAUTH_PRIVATE_KEY_PEM:?set BSVIBE_OAUTH_PRIVATE_KEY_PEM in .env.prod — see the comment above}
      BSVIBE_PWA_URL: ${BSVIBE_PWA_URL:-https://app.bsvibe.dev}
      # Sandbox: verification/work command checks run in a per-project DinD
      # container (toolchain: pytest/ruff/uv). Enable with the `sandbox`
      # compose profile + BSVIBE_SANDBOX_ENABLED=true (see README §5 Stage B).
      # SANDBOX_USER=0:0 matches the worker's root-owned run worktrees so the
      # sandbox can write /work.
      BSVIBE_SANDBOX_ENABLED: ${BSVIBE_SANDBOX_ENABLED:-false}
      BSVIBE_SANDBOX_IMAGE: ${BSVIBE_SANDBOX_IMAGE:-bsvibe-sandbox:latest}
      BSVIBE_DOCKER_HOST: ${BSVIBE_DOCKER_HOST:-}
      BSVIBE_SANDBOX_USER: ${BSVIBE_SANDBOX_USER:-}
    volumes:
      - appdata:/app/var

  worker:
    # Staged rollout: scale to 0 to bring up api+auth first (UI testing), then
    # `docker compose ... up -d --scale worker=1` for the LLM/execution phase.
    # The entrypoint override (in compose.yaml) keeps the worker from migrating.
    environment:
      # T2b-1 — the SAME signing key the backend uses. The worker mints the run-scoped task
      # token; the backend's MCP API verifies it. Two ephemeral keys can never agree.
      BSVIBE_OAUTH_PRIVATE_KEY_PEM: ${BSVIBE_OAUTH_PRIVATE_KEY_PEM:?set BSVIBE_OAUTH_PRIVATE_KEY_PEM in .env.prod}
      BSVIBE_OAUTH_ISSUER: ${BSVIBE_OAUTH_ISSUER:-https://api.bsvibe.dev}
      # The worker connects as the RUNTIME role too (least privilege). It does
      # NOT migrate (entrypoint override), so it needs neither the owner
      # migration URL nor the app password. It never sets the RLS GUC, so its
      # reads fail-open across workspaces — exactly what a queue poller needs.
      BSVIBE_DATABASE_URL: ${BSVIBE_DATABASE_URL:?set BSVIBE_DATABASE_URL (runtime bsvibe_app role)}
      BSVIBE_REDIS_URL: ${BSVIBE_REDIS_URL:-redis://redis:6379/0}
      BSVIBE_ENVIRONMENT: ${BSVIBE_ENVIRONMENT:-prod}
      BSVIBE_WORKER_MODE: ${BSVIBE_WORKER_MODE:-db_polling}
      BSVIBE_GIT_SHA: ${GIT_SHA:-prod}
      BSVIBE_GATEWAY_KMS_KEY_B64: ${BSVIBE_GATEWAY_KMS_KEY_B64:?set BSVIBE_GATEWAY_KMS_KEY_B64}
      BSVIBE_SUPABASE_URL: ${BSVIBE_SUPABASE_URL:?set BSVIBE_SUPABASE_URL}
      BSVIBE_SUPABASE_PUBLISHABLE_KEY: ${BSVIBE_SUPABASE_PUBLISHABLE_KEY:?set BSVIBE_SUPABASE_PUBLISHABLE_KEY}
      BSVIBE_DEFAULT_WORKSPACE_REGION: ${BSVIBE_DEFAULT_WORKSPACE_REGION:-us-1}
      BSVIBE_KNOWLEDGE_VAULT_ROOT: ${BSVIBE_KNOWLEDGE_VAULT_ROOT:-/app/var/vault}
      BSVIBE_KNOWLEDGE_DEFAULT_REGION: ${BSVIBE_KNOWLEDGE_DEFAULT_REGION:-us-1}
      # Knowledge semantic-search embedding (G6): the pgvector index DERIVED from
      # the Markdown SoT. Deployment-level model — set it and every settled note
      # is auto-embedded + queries embed against it; empty disables semantic
      # search (canon/decision/rejection retrieval unaffected). e.g.
      # ``ollama/bge-m3`` + api_base ``http://host.docker.internal:11434``.
      BSVIBE_KNOWLEDGE_EMBEDDING_MODEL: ${BSVIBE_KNOWLEDGE_EMBEDDING_MODEL:-}
      BSVIBE_KNOWLEDGE_EMBEDDING_API_BASE: ${BSVIBE_KNOWLEDGE_EMBEDDING_API_BASE:-}
      BSVIBE_SKILLS_ROOT: ${BSVIBE_SKILLS_ROOT:-/app/var/skills}
      BSVIBE_RUN_WORKSPACE_ROOT: ${BSVIBE_RUN_WORKSPACE_ROOT:-/app/var/runs}
      BSVIBE_AUDIT_RELAY_URL: ${BSVIBE_AUDIT_RELAY_URL:-}
      BSVIBE_SANDBOX_ENABLED: ${BSVIBE_SANDBOX_ENABLED:-false}
      BSVIBE_SANDBOX_IMAGE: ${BSVIBE_SANDBOX_IMAGE:-bsvibe-sandbox:latest}
      BSVIBE_DOCKER_HOST: ${BSVIBE_DOCKER_HOST:-}
      BSVIBE_SANDBOX_USER: ${BSVIBE_SANDBOX_USER:-}
    volumes:
      - appdata:/app/var

  pwa:
    # PWA is normally deployed on Vercel (native Next build, NOT Dockerfile.pwa).
    # If you DO run the containerized PWA, point it at the backend's PUBLIC URL.
    # Scale to 0 by default for the Vercel path: `... up -d --scale pwa=0`.
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}

volumes:
  appdata:
