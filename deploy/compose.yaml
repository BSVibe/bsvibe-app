# BSVibe Phase 0 — local docker compose stack.
# Ports match the bsvibe-app slot in ~/Works/_infra-phase0/port-map.md:
#   APP=8700 · FRONTEND=3700 · PG=5442 · REDIS=6387
# Run from the repo root: `docker compose -f deploy/compose.yaml up -d`

name: bsvibe-app

services:
  postgres:
    # pgvector/pgvector:pg16 = postgres:16 + pgvector extension preinstalled.
    # Required for `CREATE EXTENSION vector` in the 1.5b migration.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bsvibe
      POSTGRES_PASSWORD: bsvibe
      POSTGRES_DB: bsvibe
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsvibe -d bsvibe"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6387:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    restart: unless-stopped
    environment:
      BSVIBE_DATABASE_URL: postgresql+asyncpg://bsvibe:bsvibe@postgres:5432/bsvibe
      BSVIBE_REDIS_URL: redis://redis:6379/0
      BSVIBE_ENVIRONMENT: dev
      BSVIBE_GIT_SHA: ${GIT_SHA:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8700:8000"

  worker:
    # The production worker daemon — runs every DB-polling worker with real
    # dependencies (intake → agent → delivery → settle → relay). Same image +
    # env as the API service; just a different entrypoint command.
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    restart: unless-stopped
    # Override the migrate-on-boot entrypoint: only the `backend` (api) service
    # runs `alembic upgrade head`, so the worker never races it. The worker
    # starts directly into the daemon.
    entrypoint: []
    command: ["uv", "run", "python", "-m", "backend.workers"]
    environment:
      BSVIBE_DATABASE_URL: postgresql+asyncpg://bsvibe:bsvibe@postgres:5432/bsvibe
      BSVIBE_REDIS_URL: redis://redis:6379/0
      BSVIBE_ENVIRONMENT: dev
      BSVIBE_GIT_SHA: ${GIT_SHA:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pwa:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pwa
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3700:3700"

  # Per-project work/verification sandbox daemon (Docker-in-Docker).
  #
  # The worker shells out `docker -H tcp://sandbox-dind:2375 run …` to spawn a
  # bsvibe-sandbox container per project; the verifier's declared `command`
  # checks (pytest/ruff/uv) run INSIDE that container — which carries the
  # toolchain the worker image deliberately lacks.
  #
  # `appdata` is mounted at the SAME path (/app/var) as the worker so a
  # bind-mount of the run worktree (`-v /app/var/runs/<id>:/work`) resolves
  # against the dind daemon's filesystem to the same files the worker wrote
  # (the named-volume + bind-mount trap — see the dind-sandbox skill). The
  # nested daemon's own image/volume store lives on `dind-storage`.
  #
  # Behind the `sandbox` profile: only started with `--profile sandbox`, so a
  # plain local `up` does not run a privileged daemon. Enable it in prod
  # alongside BSVIBE_SANDBOX_ENABLED=true (see deploy/README.md §5 Stage B).
  sandbox-dind:
    image: docker:28-dind
    profiles: ["sandbox"]
    container_name: bsvibe-sandbox-dind
    privileged: true
    restart: unless-stopped
    environment:
      # Listen on plaintext tcp/2375 (no TLS) — reachable ONLY on the internal
      # compose network, never published to the host.
      DOCKER_TLS_CERTDIR: ""
    command:
      ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock"]
    volumes:
      - appdata:/app/var
      - dind-storage:/var/lib/docker

volumes:
  pgdata:
  redisdata:
  dind-storage:
