[mypy]
python_version = 3.11
strict = true
files = backend
exclude = (?x)(
    backend/data/migrations/.*
  | backend/workers/.*
  | backend/shared/.*
  )

[mypy-pytest.*]
ignore_missing_imports = true

[mypy-redis.*]
ignore_missing_imports = true

[mypy-litellm.*]
ignore_missing_imports = true

[mypy-pgvector.*]
ignore_missing_imports = true

[mypy-alembic.*]
ignore_missing_imports = true

[mypy-yaml]
ignore_missing_imports = true

[mypy-networkx.*]
ignore_missing_imports = true

[mypy-numpy.*]
ignore_missing_imports = true

# Lifted libraries (bsvibe-core/authz/fastapi) were never under mypy strict
# upstream. Relax until their next module-owner pass cleans them up.
[mypy-backend.shared.*]
strict = false
warn_unused_ignores = false
