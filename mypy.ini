[mypy]
python_version = 3.11
strict = true
files = backend
exclude = (?x)(
    backend/data/migrations/.*
  )

[mypy-pytest.*]
ignore_missing_imports = true

[mypy-redis.*]
ignore_missing_imports = true

[mypy-litellm.*]
ignore_missing_imports = true

[mypy-pgvector.*]
ignore_missing_imports = true

[mypy-alembic.*]
ignore_missing_imports = true

[mypy-yaml]
ignore_missing_imports = true

[mypy-networkx.*]
ignore_missing_imports = true

[mypy-numpy.*]
ignore_missing_imports = true

[mypy-watchdog.*]
ignore_missing_imports = true

# No per-module deferrals remain. The BSNexus orchestrator lift
# (execution.orchestrator / work_steps / run_attempt_executor / brief /
# directions / deliverables / verification / run_attempts / planning /
# verifier.judge) was deleted as a dead parallel implementation — the
# monorepo drives orchestration through execution.db + orchestrator.agent_runner.
# The knowledge.graph.* modules were un-deferred (ordinary typing fixes).
