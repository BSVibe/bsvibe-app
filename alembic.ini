# Alembic configuration for the BSVibe monorepo backend.
#
# Production / dev DB URLs come from BSVIBE_DATABASE_URL via env.py;
# the sqlalchemy.url below is a no-op fallback. Async-capable URL
# scheme (postgresql+asyncpg) is what env.py expects.

[alembic]
script_location = backend/data/migrations
prepend_sys_path = .
version_path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(slug)s
sqlalchemy.url = postgresql+asyncpg://bsvibe:bsvibe@localhost:5442/bsvibe

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
