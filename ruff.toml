line-length = 100
target-version = "py311"

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # bugbear
    "ASYNC", # async
    "PL",    # pylint
    "S",     # bandit (security)
]
ignore = [
    "E501",   # line length (formatter handles)
    "PLR0913", # too many args
    "PLR2004", # magic value
    "S101",    # asserts (we want them in tests)
]

[lint.per-file-ignores]
# Test code legitimately uses blocking FS calls inside async test functions
# (ASYNC230 open(), ASYNC240 pathlib methods) — the sync hit is fine in a test.
"tests/**/*.py" = ["S", "PL", "B008", "ASYNC230", "ASYNC240"]
# Same allowances apply to the bsvibe_sdk package's own test suite
# (Lift S — SDK ships its own pytest target).
"bsvibe_sdk/tests/**/*.py" = ["S", "PL", "B008", "ASYNC230", "ASYNC240"]
# Same allowances apply to per-plugin test suites that ship under
# ``plugin/<name>/tests/`` (Lift R1 — connectors relocated to repo root).
"plugin/*/tests/**/*.py" = ["S", "PL", "B008", "ASYNC230", "ASYNC240"]
"backend/data/migrations/**" = ["E", "F", "I", "UP", "B"]
# Lifted shared libraries: idiomatic FastAPI/settings patterns
"backend/shared/**" = ["B008", "PLW0603", "PLR0911", "PLR0912", "PLR0915"]
# Bundle K lift carries BSage's idiomatic patterns: lazy imports inside
# functions (PLC0415), default-factory lambdas (PLW0108), large dispatch
# methods (PLR091x), file-system path methods inside async helpers
# (ASYNC240 — guarded via asyncio.to_thread at runtime), single SQL string
# composition for in-memory aiosqlite (S608), and an E402 from the canon
# tools stub block. These trip ruff but match the original module shape.
"backend/knowledge/**" = [
    "PLC0415",
    "PLW0108",
    "PLR0911",
    "PLR0912",
    "PLR0915",
    "PLW2901",
    "ASYNC240",
    "S608",
    "E402",
]
# Bundle X lift carries BSNexus's idiomatic patterns, plus a long tail of
# F821 from the stubbed src.models / src.queue / src.storage / etc. imports
# (TODO(bundle-x-integration) sites). When Bundle G / Bundle API land those
# integrations, F821 can be re-enabled on a per-file basis.
"backend/orchestrator/**" = ["PLW0108"]
"backend/workers/**" = ["PLW0108"]
"backend/workspaces/**" = ["PLW0108"]
"backend/execution/**" = [
    "F821",
    "PLC0415",
    "PLW0108",
    "PLR0911",
    "PLR0912",
    "PLR0915",
    "PLW2901",
    "ASYNC240",
    "UP042",
    "S105",
    "S108",
    "S110",
    "S604",
    "UP017",
    "UP037",
    "UP041",
]
# Lift H1 — files moved from ``backend/execution/`` retain the same
# legacy patterns (``str + Enum``). New v8 code in ``backend/workflow/``
# (state.py / transitions.py / future H2/H3 modules) is held to the
# standard rules.
"backend/workflow/domain/_domain.py" = ["UP042"]
"backend/workflow/domain/state_machine.py" = ["UP042"]
# Lift H3a — files moved from ``backend/intake/`` retain the
# default-factory lambdas (PLW0108) ignore that the original location had.
"backend/workflow/infrastructure/intake/**" = ["PLW0108"]
"backend/workflow/domain/incoming.py" = ["PLW0108"]
"backend/workflow/application/intake/**" = ["PLW0108"]
# Lift H3b — files moved from ``backend/delivery/`` retain the same
# default-factory lambdas (PLW0108) ignore the original location had.
"backend/workflow/infrastructure/delivery/**" = ["PLW0108"]
"backend/workflow/domain/delivery.py" = ["PLW0108"]
"backend/workflow/application/delivery/**" = ["PLW0108"]
"backend/workflow/application/safe_mode_queue.py" = ["PLW0108"]
"backend/workflow/application/safe_mode_expiry.py" = ["PLW0108"]
# Lift Schedule — files lifted from ``backend/intake/`` and
# ``backend/workers/schedule_runner.py`` retain the same default-factory
# lambdas (PLW0108) ignore the original locations had.
"backend/schedule/**" = ["PLW0108"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
