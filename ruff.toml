line-length = 100
target-version = "py311"

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # bugbear
    "ASYNC", # async
    "PL",    # pylint
    "S",     # bandit (security)
]
ignore = [
    "E501",   # line length (formatter handles)
    "PLR0913", # too many args
    "PLR2004", # magic value
    "S101",    # asserts (we want them in tests)
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S", "PL", "B008"]
"backend/data/migrations/**" = ["E", "F", "I", "UP", "B"]
# Lifted shared libraries: idiomatic FastAPI/settings patterns
"backend/shared/**" = ["B008", "PLW0603", "PLR0911", "PLR0912", "PLR0915"]
# Bundle K lift carries BSage's idiomatic patterns: lazy imports inside
# functions (PLC0415), default-factory lambdas (PLW0108), large dispatch
# methods (PLR091x), file-system path methods inside async helpers
# (ASYNC240 — guarded via asyncio.to_thread at runtime), single SQL string
# composition for in-memory aiosqlite (S608), and an E402 from the canon
# tools stub block. These trip ruff but match the original module shape.
"backend/knowledge/**" = [
    "PLC0415",
    "PLW0108",
    "PLR0911",
    "PLR0912",
    "PLR0915",
    "PLW2901",
    "ASYNC240",
    "S608",
    "E402",
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
