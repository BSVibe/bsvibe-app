[project]
name = "bsvibe-app"
version = "0.1.0"
description = "BSVibe AI agent OS — unified monorepo (PWA + FastAPI backend)"
license = { text = "BSL-1.1" }
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic>=2",
    "pydantic-settings>=2.5",
    "structlog>=24",
    "httpx>=0.27",
    "pyjwt[crypto]>=2.9",
    "sqlmodel>=0.0.22",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "asyncpg>=0.29",
    "redis>=5",
    "jsonschema>=4",
    "cryptography>=42",
    "pgvector>=0.3.0",
    "networkx>=3",
    "pyyaml>=6",
    "mcp>=1",
    "aiosqlite>=0.20",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
    "anyio>=4",
    "respx>=0.21",
    "types-jsonschema>=4",
    "aiosqlite>=0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backend"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra"

[tool.coverage.run]
source = ["backend"]
omit = [
    "backend/*/migrations/*",
    "backend/workers/*",
    # Deferred lift modules — see mypy.ini header for the Bundle ↔ file
    # mapping. These reference domain types not in Bundle 1's lift envelope
    # (Request / Direction / Project / WorkPlan / RunAttempt /
    # VerificationAspect / Decision / Deliverable / Vault primitives) and
    # are NOT reachable from any HTTP route / worker / test in this PR.
    # They re-enter coverage measurement per-module as Bundle G / Bundle K
    # land their lifts.
    "backend/execution/orchestrator.py",
    "backend/execution/brief.py",
    "backend/execution/run_attempt_executor.py",
    "backend/execution/run_attempts.py",
    "backend/execution/work_steps.py",
    "backend/execution/verification.py",
    "backend/execution/directions.py",
    "backend/execution/deliverables.py",
    "backend/execution/repo_deps.py",
    "backend/execution/advisory_lock.py",
    "backend/execution/planning/context.py",
    "backend/execution/planning/decomposer.py",
    "backend/execution/planning/prompts.py",
    "backend/execution/verifier/judge.py",
    "backend/execution/verifier/contract.py",
]
