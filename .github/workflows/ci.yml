name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg16 = postgres:16 + pgvector extension.
        # Required by the 1.5b migration's `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bsvibe
          POSTGRES_PASSWORD: bsvibe
          POSTGRES_DB: bsvibe
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bsvibe -d bsvibe"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      BSVIBE_DATABASE_URL: postgresql+asyncpg://bsvibe:bsvibe@localhost:5432/bsvibe
      BSVIBE_REDIS_URL: redis://localhost:6379/0
      BSVIBE_ENVIRONMENT: dev
      BSVIBE_GIT_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: uv sync
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check backend/ tests/

      - name: Ruff (format check)
        run: uv run ruff format --check backend/ tests/

      - name: mypy --strict (backend/)
        run: uv run mypy backend/

      - name: alembic upgrade head (fresh-PG migration smoke)
        run: uv run alembic upgrade head

      - name: pytest with coverage (smoke + unit)
        # Coverage gate set to 60% for this PR. The 80% target requires
        # porting BSage's 166-file test suite for the knowledge/canonicalization
        # / knowledge/retrieval / knowledge/ingest / knowledge/graph modules
        # — scheduled in follow-up PRs alongside each Bundle integration.
        # See PR #5 description "Coverage roadmap" for the per-bundle gate
        # raises (Bundle K: 65% → Bundle G: 72% → Bundle Q: 80%).
        run: uv run pytest --cov=backend --cov-fail-under=60 -v

  pwa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pwa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: pnpm install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
