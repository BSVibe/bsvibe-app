name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg16 = postgres:16 + pgvector extension.
        # Required by the 1.5b migration's `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bsvibe
          POSTGRES_PASSWORD: bsvibe
          POSTGRES_DB: bsvibe
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bsvibe -d bsvibe"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      # B2b two-role Postgres. The app/tests connect as the RUNTIME role
      # (bsvibe_app, NOSUPERUSER NOBYPASSRLS) so Postgres RLS actually governs
      # them — the production-tier RLS test proves layer-3 isolation only when
      # the connection is NOT a superuser. Migrations (alembic) run as the OWNER
      # role via BSVIBE_MIGRATION_DATABASE_URL; the `runtime_role` migration
      # CREATEs bsvibe_app + grants and sets its password from
      # BSVIBE_APP_DB_PASSWORD.
      BSVIBE_DATABASE_URL: postgresql+asyncpg://bsvibe_app:bsvibe_app_ci@localhost:5432/bsvibe
      BSVIBE_MIGRATION_DATABASE_URL: postgresql+asyncpg://bsvibe:bsvibe@localhost:5432/bsvibe
      BSVIBE_APP_DB_PASSWORD: bsvibe_app_ci
      BSVIBE_REDIS_URL: redis://localhost:6379/0
      BSVIBE_ENVIRONMENT: dev
      BSVIBE_GIT_SHA: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: uv sync
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check backend/ tests/ bsvibe_sdk/ plugin/

      - name: Ruff (format check)
        run: uv run ruff format --check backend/ tests/ bsvibe_sdk/ plugin/

      - name: Import contracts (import-linter)
        # Lift N defensive pattern #2 / #9 (v8 §22 / D45) — critical CI gate.
        # SDK isolation, common-leaf one-way, connector-plugin allow-list.
        run: uv run lint-imports

      - name: mypy --strict (backend/)
        run: uv run mypy backend/

      - name: mypy --strict (bsvibe_sdk/)
        run: uv run mypy --strict --python-version 3.11 bsvibe_sdk/bsvibe_sdk/

      - name: alembic upgrade head (fresh-PG migration smoke + provision runtime role)
        # Runs as the OWNER (BSVIBE_MIGRATION_DATABASE_URL). This both smoke-tests
        # the migration chain on a fresh PG AND provisions the bsvibe_app runtime
        # role + grants, so the pytest step below can connect as it. MUST run
        # before pytest — the app engine (BSVIBE_DATABASE_URL) is bsvibe_app.
        run: uv run alembic upgrade head

      - name: pytest with coverage (smoke + unit — app as non-superuser runtime role)
        run: uv run pytest --cov=backend --cov=plugin --cov-fail-under=80 -v

      - name: pytest (bsvibe_sdk)
        run: uv run pytest bsvibe_sdk/tests/ -v

  pwa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pwa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: pnpm install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

      - name: Build
        run: pnpm build
